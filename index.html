<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#e67e22">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Reprise">
  <meta name="description" content="Suivi de programme sportif : planning et carnet de séances">
  <title>Programme Sportif — Reprise</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">REPRISE</span>
        </div>
        <span class="header-subtitle">43 ans · 68 kg · Semaine de reprise</span>
      </div>
      <nav class="header-nav">
        <button class="nav-btn active" data-view="agenda" onclick="showView('agenda')">
          <span class="nav-icon">📅</span> Planning
        </button>
        <button class="nav-btn" data-view="carnet" onclick="showView('carnet')">
          <span class="nav-icon">📓</span> Carnet
        </button>
      </nav>
    </header>

    <!-- AGENDA VIEW -->
    <main id="view-agenda" class="view active">
      <div class="week-header">
        <button class="week-nav" onclick="changeWeek(-1)">◀</button>
        <h2 id="week-label" class="week-title">Semaine du ...</h2>
        <button class="week-nav" onclick="changeWeek(1)">▶</button>
      </div>

      <div class="week-grid" id="week-grid">
        <!-- Generated by JS -->
      </div>

      <div class="legend">
        <span class="legend-item"><span class="legend-dot rest"></span>Repos</span>
        <span class="legend-item"><span class="legend-dot cardio"></span>Cardio salle</span>
        <span class="legend-item"><span class="legend-dot push"></span>Muscu — Poussée</span>
        <span class="legend-item"><span class="legend-dot run"></span>Footing</span>
        <span class="legend-item"><span class="legend-dot pull"></span>Muscu — Tirage</span>
      </div>
    </main>

    <!-- CARNET VIEW -->
    <main id="view-carnet" class="view">
      <div class="carnet-header">
        <h2 class="carnet-title">Carnet de séances</h2>
        <div class="carnet-tabs">
          <button class="carnet-tab active" data-session="poussee" onclick="showSession('poussee')">🟠 Poussée</button>
          <button class="carnet-tab" data-session="tirage" onclick="showSession('tirage')">🔵 Tirage</button>
        </div>
      </div>

      <div class="session-date-picker">
        <label for="session-date">Date de la séance :</label>
        <input type="date" id="session-date" onchange="loadSessionData()">
      </div>

      <!-- Poussée session -->
      <div id="session-poussee" class="session-card active">
        <div class="session-banner push-banner">
          <h3>SÉANCE POUSSÉE</h3>
          <p>Pectoraux · Épaules · Triceps</p>
        </div>
        <div class="exercises-list" id="exercises-poussee">
          <!-- Generated by JS -->
        </div>
      </div>

      <!-- Tirage session -->
      <div id="session-tirage" class="session-card">
        <div class="session-banner pull-banner">
          <h3>SÉANCE TIRAGE</h3>
          <p>Dos · Biceps · Gainage</p>
        </div>
        <div class="exercises-list" id="exercises-tirage">
          <!-- Generated by JS -->
        </div>
      </div>

      <div class="carnet-actions">
        <button class="btn-save" onclick="saveSession()">💾 Sauvegarder la séance</button>
        <button class="btn-reset" onclick="resetSession()">🔄 Réinitialiser</button>
      </div>

      <div id="save-toast" class="toast hidden">✅ Séance sauvegardée !</div>
    </main>

    <!-- Install PWA banner -->
    <div id="install-banner" class="install-banner hidden">
      <span>📲 Installer l'appli sur ton téléphone</span>
      <button id="install-btn" class="install-btn">Installer</button>
      <button class="install-close" onclick="dismissInstall()">✕</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
